<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DevHub · App Performance Marketing Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ========== Design Tokens (Obsidian Flux) ========== */
  :root {
    --background: #121315;
    --surface-base: #08090A;
    --surface-raised: #111827;
    --surface-overlay: #1F2937;
    --surface-container-lowest: #0d0e0f;
    --surface-container-low: #1b1c1d;
    --surface-container: #1f2021;
    --surface-container-high: #292a2b;
    --surface-container-highest: #343536;
    --primary: #adc6ff;
    --primary-container: #4d8eff;
    --secondary: #4cd7f6;
    --text-primary: #F9FAFB;
    --text-secondary: #9CA3AF;
    --text-muted: #6B7280;
    --border-subtle: rgba(255, 255, 255, 0.08);
    --border-stronger: rgba(255, 255, 255, 0.14);

    --radius-default: 0.125rem;
    --radius-lg: 0.25rem;
    --radius-xl: 0.5rem;
    --radius-full: 0.75rem;

    --sidebar-width: 280px;
    --container-max: 1280px;
    --gutter: 1.5rem;
    --section-gap: 2rem;

    --font-sans: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--background);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 20px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "cv02","cv03","cv04","cv11";
  }

  /* numeric ui */
  table, .tnum, .metric, .num, code, pre { font-variant-numeric: tabular-nums; }

  /* ========== Layout ========== */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    min-height: 100vh;
  }

  /* ----- Sidebar ----- */
  .sidebar {
    background: var(--surface-container-lowest);
    border-right: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 1.25rem 0.75rem;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.25rem 0.5rem 1rem 0.5rem;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 0.75rem;
  }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
    display: grid; place-items: center;
    color: var(--surface-base);
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .brand-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.005em;
  }
  .brand-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .sidebar-search {
    margin: 0 0.25rem 1rem;
    position: relative;
  }
  .sidebar-search input {
    width: 100%;
    background: var(--surface-container-low);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 0.5rem 0.75rem 0.5rem 2rem;
    color: var(--text-primary);
    font-size: 13px;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color 0.12s ease, background 0.12s ease;
  }
  .sidebar-search input::placeholder { color: var(--text-muted); }
  .sidebar-search input:focus {
    border-color: var(--primary);
    background: var(--surface-container);
  }
  .sidebar-search svg {
    position: absolute;
    left: 0.625rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }
  .sidebar-search kbd {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface-container);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-default);
    padding: 1px 5px;
  }

  .nav-group { margin-bottom: 0.5rem; }
  .nav-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.625rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    border-radius: var(--radius-lg);
  }
  .nav-group-header:hover { color: var(--text-secondary); background: var(--surface-container-low); }
  .nav-group-header .chev { transition: transform 0.15s ease; }
  .nav-group.collapsed .chev { transform: rotate(-90deg); }
  .nav-group.collapsed .nav-items { display: none; }
  .nav-group-title { display: flex; align-items: center; gap: 0.5rem; }
  .nav-group-index {
    font-family: var(--font-mono);
    color: var(--primary);
    font-size: 11px;
  }
  .nav-items { display: flex; flex-direction: column; gap: 1px; padding: 2px 0 6px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.625rem 0.4rem 1.5rem;
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 18px;
    border-radius: var(--radius-lg);
    cursor: pointer;
    border-left: 1px solid var(--border-subtle);
    margin-left: 0.85rem;
    transition: background 0.1s ease, color 0.1s ease;
  }
  .nav-item:hover {
    background: var(--surface-container-low);
    color: var(--text-primary);
  }
  .nav-item.active {
    color: var(--primary);
    background: rgba(173, 198, 255, 0.06);
    border-left-color: var(--primary);
  }
  .nav-item .ix {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 22px;
  }
  .nav-item.active .ix { color: var(--primary); }

  /* ----- Main ----- */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(18,19,21,0.85);
    backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--border-subtle);
    padding: 0.625rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .breadcrumb {
    display: flex; align-items: center; gap: 0.375rem;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
    flex-wrap: wrap;
    min-width: 0;
  }
  .breadcrumb .sep { color: var(--text-muted); flex-shrink: 0; }
  .breadcrumb .current {
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }
  .breadcrumb .crumb-link {
    color: var(--text-secondary);
    cursor: pointer;
    padding: 0.15rem 0.35rem;
    border-radius: var(--radius-default);
    border: 1px solid transparent;
    white-space: nowrap;
    transition: color 0.1s ease, background 0.1s ease, border-color 0.1s ease;
  }
  .breadcrumb .crumb-link:hover {
    color: var(--primary);
    background: rgba(173, 198, 255, 0.08);
    border-color: rgba(173, 198, 255, 0.15);
  }

  .topbar-actions { display: flex; align-items: center; gap: 0.5rem; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 13px;
    font-weight: 500;
    padding: 0.4rem 0.75rem;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-subtle);
    background: var(--surface-container-low);
    color: var(--text-primary);
    cursor: pointer;
    transition: background 0.1s ease, border-color 0.1s ease;
    font-family: var(--font-sans);
  }
  .btn:hover { background: var(--surface-container); border-color: var(--border-stronger); }
  .btn.primary {
    background: var(--primary);
    color: var(--surface-base);
    border-color: var(--primary);
  }
  .btn.primary:hover { background: #c2d4ff; }
  .btn.ghost { background: transparent; }
  .btn .kbd {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface-container);
    padding: 1px 4px;
    border-radius: var(--radius-default);
    border: 1px solid var(--border-subtle);
  }

  .content {
    max-width: var(--container-max);
    margin: 0 auto;
    padding: 2rem 2.5rem 4rem;
    width: 100%;
  }

  /* Page header */
  .page-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--primary);
    background: rgba(173, 198, 255, 0.08);
    padding: 0.25rem 0.5rem;
    border-radius: var(--radius-default);
  }
  .page-title {
    font-size: 36px;
    line-height: 44px;
    letter-spacing: -0.02em;
    font-weight: 700;
    margin: 0.75rem 0 0.5rem;
    color: var(--text-primary);
  }
  .page-deck {
    font-size: 16px;
    line-height: 24px;
    color: var(--text-secondary);
    max-width: 68ch;
    margin: 0 0 1.5rem;
  }
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--surface-container-low);
    border: 1px solid var(--border-subtle);
    padding: 0.25rem 0.55rem;
    border-radius: var(--radius-default);
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--secondary); }
  .chip.warning .dot { background: #f7b955; }
  .chip.ok .dot { background: #5ad19a; }

  /* TOC / 2-column layout */
  .with-toc {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 220px;
    gap: 3rem;
    align-items: start;
  }
  .toc {
    position: sticky;
    top: 80px;
    font-size: 12px;
  }
  .toc-title {
    font-family: var(--font-mono);
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .toc a {
    display: block;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 0.3rem 0.5rem;
    border-left: 1px solid var(--border-subtle);
    border-radius: 0;
    font-size: 13px;
    line-height: 18px;
  }
  .toc a:hover { color: var(--text-primary); border-left-color: var(--border-stronger); }
  .toc a.active { color: var(--primary); border-left-color: var(--primary); }

  /* Sections */
  section.block {
    margin-bottom: var(--section-gap);
    padding-top: 0.5rem;
    scroll-margin-top: 80px;
  }
  h2.section-title {
    font-size: 24px;
    line-height: 32px;
    letter-spacing: -0.01em;
    font-weight: 600;
    margin: 0 0 1rem;
    display: flex; align-items: center; gap: 0.5rem;
    color: var(--text-primary);
  }
  h2.section-title .ix {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--primary);
    background: rgba(173, 198, 255, 0.08);
    padding: 0.125rem 0.5rem;
    border-radius: var(--radius-default);
    font-weight: 500;
  }
  h3.sub-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 1.5rem 0 0.5rem;
  }
  p { color: var(--text-secondary); margin: 0 0 0.75rem; font-size: 14px; line-height: 22px; }
  p strong, li strong { color: var(--text-primary); font-weight: 600; }
  ul, ol { color: var(--text-secondary); padding-left: 1.25rem; margin: 0.5rem 0 1rem; }
  li { margin: 0.25rem 0; line-height: 22px; }
  code.inline {
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--primary);
    background: rgba(173, 198, 255, 0.08);
    padding: 1px 6px;
    border-radius: var(--radius-default);
    border: 1px solid var(--border-subtle);
  }

  /* Summary callout */
  .summary {
    border: 1px solid var(--border-subtle);
    background: linear-gradient(180deg, rgba(173,198,255,0.04) 0%, rgba(173,198,255,0) 100%);
    border-radius: var(--radius-xl);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .summary-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--primary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .summary p { color: var(--text-primary); margin: 0; line-height: 22px; }

  /* Code block */
  .code-block {
    background: var(--surface-container-lowest);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    overflow: hidden;
    margin: 0.75rem 0 1.25rem;
  }
  .code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.4rem 0.75rem;
    background: var(--surface-container-low);
    border-bottom: 1px solid var(--border-subtle);
  }
  .code-lang {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
  .code-lang .lang-dot { width: 8px; height: 8px; border-radius: 2px; background: var(--secondary); }
  .code-lang.swift .lang-dot { background: #fa7343; }
  .code-lang.kotlin .lang-dot { background: #7f52ff; }
  .code-lang.json .lang-dot { background: #f7b955; }
  .code-lang.bash .lang-dot { background: #5ad19a; }
  .code-lang.http .lang-dot { background: #adc6ff; }
  .copy-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-subtle);
    padding: 0.2rem 0.55rem;
    font-size: 11px;
    font-family: var(--font-mono);
    border-radius: var(--radius-default);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 0.35rem;
    transition: color 0.1s ease, border-color 0.1s ease;
  }
  .copy-btn:hover { color: var(--text-primary); border-color: var(--border-stronger); }
  .copy-btn.copied { color: var(--secondary); border-color: var(--secondary); }
  pre {
    margin: 0;
    padding: 1rem 1.25rem;
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: 1.65;
    color: #e6e8ec;
    overflow-x: auto;
    white-space: pre;
  }
  pre .k { color: #c792ea; }
  pre .s { color: #c3e88d; }
  pre .n { color: #f78c6c; }
  pre .c { color: #6B7280; font-style: italic; }
  pre .t { color: #82aaff; }
  pre .p { color: var(--text-muted); }
  pre .a { color: #ffcb6b; }

  /* Tables */
  .table-wrap {
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    overflow: hidden;
    margin: 0.75rem 0 1.25rem;
    background: var(--surface-container-lowest);
  }
  table.data {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.data thead th {
    background: var(--surface-container-low);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
    text-align: left;
    padding: 0.625rem 0.875rem;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  table.data thead th .sort-icon {
    display: inline-block;
    margin-left: 0.25rem;
    color: var(--text-muted);
    font-size: 10px;
  }
  table.data thead th.sorted-asc .sort-icon,
  table.data thead th.sorted-desc .sort-icon { color: var(--primary); }
  table.data tbody td {
    padding: 0.625rem 0.875rem;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: top;
    line-height: 20px;
  }
  table.data tbody tr:last-child td { border-bottom: none; }
  table.data tbody tr:hover td { background: var(--surface-container-low); }
  table.data td.muted { color: var(--text-secondary); }
  table.data td code, table.data td .mono {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--primary);
  }
  .pill {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 1px 6px;
    border-radius: var(--radius-default);
    border: 1px solid var(--border-subtle);
    background: var(--surface-container);
    color: var(--text-secondary);
  }
  .pill.tier-1 { color: var(--primary); border-color: rgba(173,198,255,0.3); background: rgba(173,198,255,0.06); }
  .pill.tier-2 { color: var(--secondary); border-color: rgba(76,215,246,0.3); background: rgba(76,215,246,0.06); }
  .pill.tier-3 { color: #f7b955; border-color: rgba(247,185,85,0.3); background: rgba(247,185,85,0.06); }

  /* KPI grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.75rem;
    margin: 0.75rem 0 1.5rem;
  }
  .kpi-card {
    background: var(--surface-container-lowest);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 1rem;
  }
  .kpi-card .label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }
  .kpi-card .value {
    font-size: 24px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .kpi-card .delta { font-family: var(--font-mono); font-size: 12px; color: var(--secondary); }
  .kpi-card .delta.down { color: #ff8a8a; }

  /* Pitfall / Callout */
  .callout {
    display: flex;
    gap: 0.875rem;
    padding: 0.875rem 1rem;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    background: var(--surface-container-lowest);
    margin: 0.75rem 0 1rem;
  }
  .callout.warn { border-left: 2px solid #f7b955; }
  .callout.danger { border-left: 2px solid #ff8a8a; }
  .callout.info { border-left: 2px solid var(--primary); }
  .callout .ico {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: var(--radius-default);
    display: grid; place-items: center;
    background: var(--surface-container);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
  }
  .callout.warn .ico { color: #f7b955; }
  .callout.danger .ico { color: #ff8a8a; }
  .callout.info .ico { color: var(--primary); }
  .callout .body { flex: 1; }
  .callout .body strong { color: var(--text-primary); }
  .callout p { margin: 0.15rem 0; font-size: 13px; line-height: 20px; }

  /* Dashboard cards (landing) */
  .grid-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 0.875rem;
    margin: 1rem 0 2rem;
  }
  .card {
    background: var(--surface-container-lowest);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.12s ease, background 0.12s ease, transform 0.12s ease;
  }
  .card:hover { border-color: var(--border-stronger); background: var(--surface-container-low); transform: translateY(-1px); }
  .card .card-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--primary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .card .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.4rem;
    letter-spacing: -0.005em;
  }
  .card .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 19px; margin-bottom: 0.75rem; }
  .card .card-meta {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Footer */
  .page-footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border-subtle);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono);
    font-size: 12px;

/* ========== Utilities ========== */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* Tiny syntax highlight for known languages */
function hl(code, lang) {
  let s = escapeHtml(code);
  if (lang === "swift" || lang === "kotlin") {
    s = s.replace(/(\/\/[^\n]*)/g, '<span class="c">$1</span>');
    s = s.replace(/\b(import|let|var|val|fun|func|class|object|return|if|else|for|while|self|this|true|false|nil|null|companion|override|private|public|internal|suspend)\b/g, '<span class="k">$1</span>');
    s = s.replace(/(&quot;[^&]*?&quot;)/g, '<span class="s">$1</span>');
    s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="n">$1</span>');
  } else if (lang === "json") {
    s = s.replace(/(&quot;[^&]*?&quot;)(\s*:)/g, '<span class="a">$1</span>$2');
    s = s.replace(/:\s*(&quot;[^&]*?&quot;)/g, ': <span class="s">$1</span>');
    s = s.replace(/\b(true|false|null)\b/g, '<span class="k">$1</span>');
    s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="n">$1</span>');
  } else if (lang === "bash") {
    s = s.replace(/(^|\n)(\s*)(#[^\n]*)/g, '$1$2<span class="c">$3</span>');
    s = s.replace(/\b(curl|export|echo|cd|grep|adjust|adb|xcrun)\b/g, '<span class="k">$1</span>');
    s = s.replace(/(--?[a-zA-Z][\w-]*)/g, '<span class="t">$1</span>');
  } else if (lang === "http") {
    s = s.replace(/\b(GET|POST|PUT|PATCH|DELETE)\b/g, '<span class="k">$1</span>');
    s = s.replace(/(\{[^}]+\})/g, '<span class="t">$1</span>');
  }
  return s;
}

function codeBlock(lang, label, code) {
  const id = "cb_" + Math.random().toString(36).slice(2, 9);
  return `
    <div class="code-block">
      <div class="code-block-header">

        <button class="copy-btn" data-copy-target="${id}">

          Copy
        </button>
      </div>
      <pre id="${id}"><code>${hl(code, lang)}</code></pre>
    </div>`;
}

function dataTable(headers, rows, opts = {}) {
  const id = "tb_" + Math.random().toString(36).slice(2, 9);
  const head = headers.map((h, i) =>
    `<th data-col="${i}" data-type="${h.type || "string"}">${escapeHtml(h.label)}<span class="sort-icon">↕</span></th>`
  ).join("");
  const body = rows.map(r =>
    "<tr>" + r.map(cell => {
      if (cell && typeof cell === "object" && "html" in cell) return `<td class="${cell.cls||''}">${cell.html}</td>`;
      return `<td>${escapeHtml(String(cell))}</td>`;
    }).join("") + "</tr>"
  ).join("");
  return `
    <div class="table-wrap">
      <table class="data" id="${id}" data-sortable="1">
        <thead><tr>${head}</tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>`;
}

function page_1_1() {

import AdjustSdk
import AppTrackingTransparency

func application(_ application: UIApplication,
                 didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {

    let appToken = "abc1234xyz9"  // Production token
    let environment = ADJEnvironmentProduction

          ${codeBlock("kotlin", "Android · DeeplinkRouter.kt", `object DeeplinkRouter {
    fun handle(uri: Uri): Boolean {
        val path = uri.pathSegments.firstOrNull() ?: return openHome()
        return when (path) {
            "product" -> openProduct(uri.lastPathSegment ?: return openHome())
            "promo"   -> openPromo(uri.getQueryParameter("code"))

    }

/* ========== Router ========== */
function findMeta(id) {
  for (const g of IA) {
    const it = g.items.find(x => x.id === id);
    if (it) return { ...it, group: g };
  }
  return null;
}

function setBreadcrumb(id) {
  const bc = $("#breadcrumb");
  if (!id || id === "home") {
    bc.innerHTML = `
      <span class="crumb-link" data-nav="home">Library</span>
      <span class="sep">/</span>
      <span class="current">Overview</span>`;
  } else {
    const meta = findMeta(id);
    if (!meta) return;
    bc.innerHTML = `
      <span class="crumb-link" data-nav="home">Library</span>
      <span class="sep">/</span>
      <span class="crumb-link" data-nav="home" title="${escapeHtml(meta.group.title)}">${meta.group.id} · ${escapeHtml(meta.group.title)}</span>
      <span class="sep">/</span>
      <span class="current">${meta.id} · ${escapeHtml(meta.title)}</span>`;
  }
  // bind click events
  bc.querySelectorAll('.crumb-link[data-nav]').forEach(el => {
    el.addEventListener("click", () => navigate(el.dataset.nav));
  });
}

function navigate(id) {
  const content = $("#content");
  let html = "";
  if (!id || id === "home") {
    html = pageHome();
  } else if (id === "1-1") {
    html = page_1_1();
  } else if (id === "1-2") {
    html = page_1_2();
  } else {
    const meta = findMeta(id);
    if (!meta) { html = pageHome(); id = "home"; }
    else html = pageDummy(meta);
  }
  content.innerHTML = html;
  setBreadcrumb(id);
  renderNav(id);
  bindCopyButtons();
  bindSortableTables();
  bindCardLinks();
  bindTocScrollspy();
  const newHash = id && id !== "home" ? "#" + id : "#";
  const curHash = location.hash || "#";
  if (newHash !== curHash) {
    history.pushState({ route: id }, "", newHash);
  }
  window.scrollTo({ top: 0, behavior: "instant" });
}

/* ========== Behaviors ========== */
function bindCopyButtons() {
  $$('.copy-btn').forEach(btn => {
    btn.addEventListener("click", async () => {
      const targetId = btn.dataset.copyTarget;
      const el = document.getElementById(targetId);
      if (!el) return;
      const text = el.innerText;
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand("copy");
        document.body.removeChild(ta);
      }
      btn.classList.add("copied");
      const prev = btn.innerHTML;
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied`;
      setTimeout(() => { btn.classList.remove("copied"); btn.innerHTML = prev; }, 1400);
    });
  });
}

function bindSortableTables() {
  $$('table[data-sortable="1"]').forEach(tbl => {
    const thead = tbl.querySelector("thead");
    const tbody = tbl.querySelector("tbody");
    thead.querySelectorAll("th").forEach((th, colIdx) => {
      th.addEventListener("click", () => {
        const type = th.dataset.type || "string";
        const wasAsc = th.classList.contains("sorted-asc");
        thead.querySelectorAll("th").forEach(o => o.classList.remove("sorted-asc", "sorted-desc"));
        const direction = wasAsc ? -1 : 1;
        th.classList.add(wasAsc ? "sorted-desc" : "sorted-asc");
        const rows = Array.from(tbody.querySelectorAll("tr"));
        rows.sort((a, b) => {
          const av = a.children[colIdx]?.innerText.trim() || "";
          const bv = b.children[colIdx]?.innerText.trim() || "";
          if (type === "number") return (parseFloat(av) - parseFloat(bv)) * direction;
          return av.localeCompare(bv, undefined, { numeric: true, sensitivity: "base" }) * direction;
        });
        rows.forEach(r => tbody.appendChild(r));
      });
    });
  });
}

function bindCardLinks() {
  $$('.card[data-route]').forEach(c => {
    c.addEventListener("click", () => navigate(c.dataset.route));
  });
}

function bindTocScrollspy() {
  const links = $$(".toc a");
  if (!links.length) return;
  const sections = links.map(a => document.querySelector(a.getAttribute("href"))).filter(Boolean);
  const onScroll = () => {
    const y = window.scrollY + 120;
    let activeIdx = 0;
    sections.forEach((s, i) => { if (s.offsetTop <= y) activeIdx = i; });
    links.forEach((a, i) => a.classList.toggle("active", i === activeIdx));
  };
  window.removeEventListener("scroll", window.__tocSpy || (() => {}));
  window.__tocSpy = onScroll;
  window.addEventListener("scroll", onScroll, { passive: true });
  onScroll();
}

/* ========== Sidebar search filter ========== */
function bindSearch() {
  const input = $("#searchInput");
  input.addEventListener("input", () => {
    const q = input.value.trim().toLowerCase();
    $$('.nav-item').forEach(el => {
      const t = el.innerText.toLowerCase();
      el.style.display = !q || t.includes(q) ? "" : "none";
    });
  });
  document.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
      e.preventDefault();
      input.focus();
    }
  });
}

/* ========== Init ========== */
function init() {
  const hash = (location.hash || "").replace(/^#/, "");
  renderNav(hash || null);
  bindSearch();
  navigate(hash || "home");

  // 브라우저 뒤로가기 / 앞으로가기 대응
  window.addEventListener("popstate", (e) => {
    const route = e.state?.route || (location.hash || "").replace(/^#/, "") || "home";
    navigate_silent(route);
  });

  function navigate_silent(id) {
    // pushState 없이 콘텐츠만 교체 (이미 history에 있는 항목)
    const content = $("#content");
    let html = "";
    if (!id || id === "home") html = pageHome();
    else if (id === "1-1") html = page_1_1();
    else if (id === "1-2") html = page_1_2();
    else { const meta = findMeta(id); html = meta ? pageDummy(meta) : pageHome(); }
    content.innerHTML = html;
    setBreadcrumb(id === "" ? "home" : id);
    renderNav(id === "" ? null : id);
    bindCopyButtons();
    bindSortableTables();
    bindCardLinks();
    bindTocScrollspy();
    window.scrollTo({ top: 0, behavior: "instant" });
  }
}

document.addEventListener("DOMContentLoaded", init);
</script>
